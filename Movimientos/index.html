<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos – Morita Store</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../img/logo.png" alt="Morita Store">
        <h2>Morita Store</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="../inicio/index.html"      class="nav-link"><span class="nav-icon">🏠</span> Inicio</a>
        <a href="../productos/index.html"   class="nav-link"><span class="nav-icon">📦</span> Productos</a>
        <a href="../movimientos/index.html" class="nav-link"><span class="nav-icon">🔄</span> Movimientos</a>
        <a href="../stock/index.html"       class="nav-link"><span class="nav-icon">📊</span> Stock</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Movimientos</h1>
        <p>Registro de ingresos y salidas de inventario</p>
      </div>

      <div class="card">
        <div id="alertMovimientos" class="alert"></div>

        <form id="formMovimiento" onsubmit="registrarMovimiento(event)">
          <div class="form-grid">

            <!-- Autocomplete de producto -->
            <div class="form-group" style="position: relative;">
              <label for="codigoMov">Código del Producto *</label>
              <input type="text" id="codigoMov" required
                     placeholder="Buscar por código o nombre..."
                     autocomplete="off">
              <div id="autocompleteResults" class="autocomplete-results"></div>
            </div>

            <div class="form-group">
              <label for="fechaMov">Fecha *</label>
              <input type="date" id="fechaMov" required>
            </div>

            <div class="form-group">
              <label for="tipoMov">Tipo *</label>
              <select id="tipoMov" required>
                <option value="INGRESO">Ingreso</option>
                <option value="SALIDA">Salida</option>
              </select>
            </div>

            <div class="form-group">
              <label for="cantidadMov">Cantidad *</label>
              <input type="number" id="cantidadMov" required min="0.01" step="0.01" placeholder="0">
            </div>

          </div>

          <div class="form-group">
            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones" placeholder="Detalles adicionales..."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnMovimiento">Registrar Movimiento</button>
            <button type="reset"  class="btn btn-secondary" onclick="resetFecha()">Limpiar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
