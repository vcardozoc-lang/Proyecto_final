<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos – Morita Store</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../img/logo.png" alt="Morita Store">
        <h2>Morita Store</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="../inicio/index.html"      class="nav-link"><span class="nav-icon">🏠</span> Inicio</a>
        <a href="../productos/index.html"   class="nav-link"><span class="nav-icon">📦</span> Productos</a>
        <a href="../movimientos/index.html" class="nav-link"><span class="nav-icon">🔄</span> Movimientos</a>
        <a href="../stock/index.html"       class="nav-link"><span class="nav-icon">📊</span> Stock</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Productos</h1>
        <p>Registro de nuevos productos al inventario</p>
      </div>

      <div class="card">
        <div id="alertProductos" class="alert"></div>

        <form id="formProducto" onsubmit="registrarProducto(event)">
          <div class="form-grid">

            <div class="form-group">
              <label for="codigo">Código *</label>
              <input type="text" id="codigo" required placeholder="Ej: PROD-001">
            </div>

            <div class="form-group">
              <label for="nombre">Nombre *</label>
              <input type="text" id="nombre" required placeholder="Ej: Shampoo 500ml">
            </div>

            <div class="form-group">
              <label for="unidad">Unidad de Medida *</label>
              <select id="unidad" required>
                <option value="Unidades">Unidades</option>
                <option value="Litros">Litros</option>
                <option value="Kilogramos">Kilogramos</option>
                <option value="Cajas">Cajas</option>
                <option value="Paquetes">Paquetes</option>
              </select>
            </div>

            <div class="form-group">
              <label for="grupo">Categoría *</label>
              <select id="grupo" required>
                <option value="General">General</option>
                <option value="Milagros">Milagros</option>
                <option value="Anyeluz">Anyeluz</option>
                <option value="Click Hair">Click Hair</option>
              </select>
            </div>

            <div class="form-group">
              <label for="stockMin">Stock Mínimo</label>
              <input type="number" id="stockMin" min="0" value="0">
            </div>

            <div class="form-group">
              <label for="precioVenta">Precio de Venta</label>
              <input type="number" id="precioVenta" min="0" step="0.01" value="0" placeholder="0.00">
            </div>

          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnRegistrar">Registrar Producto</button>
            <button type="reset"  class="btn btn-secondary">Limpiar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
